<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Foodie FAQ Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #fff3e0;
        }

        h1{
            color: orange;
            font-weight: bold;
        }

        .faq-box{
            margin-top: 50px;
        }

    </style>

</head>

<body>
    <div id="header1"></div>

    <div class="container faq-box">

        <h1 class="text-center mb-5">
            Foodie FAQ
        </h1>

        <!-- FAQ Accordion -->

        <div class="accordion" id="faqAccordion">

            <!-- Question 1 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq1">

                        What food items are available?

                    </button>

                </h2>

                <div id="faq1"
                class="accordion-collapse collapse show"
                data-bs-parent="#faqAccordion">

                    <div class="accordion-body">

                        We provide Pizza, Burger, Pasta,
                        French Fries and more delicious food.

                    </div>

                </div>

            </div>

            <!-- Question 2 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq2">

                        How can I order food?

                    </button>

                </h2>

                <div id="faq2"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">

                    <div class="accordion-body">

                        Go to Menu page and click on
                        Buy Now or Add to Cart button.

                    </div>

                </div>

            </div>

            <!-- Question 3 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq3">

                        What payment methods are accepted?

                    </button>

                </h2>

                <div id="faq3"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">

                    <div class="accordion-body">

                        We accept UPI, Credit Card,
                        Debit Card and Cash on Delivery.

                    </div>

                </div>

            </div>

            <!-- Question 4 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq4">

                        Is home delivery available?

                    </button>

                </h2>

                <div id="faq4"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">

                    <div class="accordion-body">

                        Yes, we provide fast home delivery.

                    </div>

                </div>

            </div>

        </div>

    </div><br><br><br><br>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <div id="footer1"></div>
    <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Foodie Payment Page</title>

    <style>
        .container{
            font-family: Arial;
            background-color:#fff3e0;
            text-align:center;
        }

        .payment-box{
            background:white;
            width:350px;
            margin:auto;
            margin-top:50px;
            padding:25px;
            border-radius:10px;
            border: 1px solid black;
            margin-bottom: 50px;
            margin-top: 50px;
            
        }

        h1{
            color:orange;
        }

        input, select{
            width:90%;
            padding:10px;
            margin:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            background-color:orange;
            color:white;
            border:none;
            padding:12px 20px;
            width:95%;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        
        }

        button:hover{
            background-color:darkorange;
        }
    </style>
</head>

<body>
    <div id="header1"></div><br><br>

    <div class="payment-box">

        <h1>Foodie Payment</h1>

        <form>

            <input type="text" placeholder="Enter Your Name" required>

            <input type="number" placeholder="Enter Amount" required>

            <select required>
                <option value="">Select Payment Method</option>
                <option>UPI</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>Cash on Delivery</option>
            </select>

            <input type="text" placeholder="UPI ID / Card Number"><br><br>

            <button type="submit">
                Pay Now
            </button>

        </form>

    </div>
    <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>

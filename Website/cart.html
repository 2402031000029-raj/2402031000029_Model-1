<!DOCTYPE html>
<html>
<head>

    <title>Foodie Cart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            font-family: Arial;
            background:#fff3e0;
            margin:0;
            padding:0;
            text-align:center;
        }

        h1{
            margin-top:40px;
            margin-bottom:30px;
        }

        h2{
            padding-top: 5px;
            font-size:20px;
        }

        .food-box{
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 0 10px gray;
        transition:0.4s;
        }
        .food-box:hover{
    transform:scale(1.05);
}
        
        

        /* FOOD CONTAINER */

        .food-container{
            display:flex;
            flex-wrap:wrap;
            grid-template-columns:repeat(4, 1fr);
            justify-content:center;
            gap:25px;
            padding:20px;
            transition-duration: 0.3s;
        }

        /* FOOD CARD */

        .food-box{
            background:white;
            width:250px;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
        }

        .food-box img{
            width:200px;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            font-size:17px;
            font-weight:bold;
            color:orange;
        }

        /* BUTTON */

        .cart-btn{
            background:orange;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        .cart-btn:hover{
            background:darkorange;
        }

    </style>

</head>

<body>
    <div id="header1"></div>
    <h1>Foodie Cart</h1>

    <!-- PRICE FILTER -->

    <div class="filter-box">

        <input type="range"
        min="50"
        max="300"
        value="300"
        id="priceRange"
        class="form-range w-25 mx-auto">

        <h5>
            Max Price:
            ₹<span id="priceValue">300</span>
        </h5>

    </div>

    <!-- FOOD ITEMS -->

    <div class="food-container">

        <!-- PIZZA -->

        <div class="food-box"
        data-price="199">

            <img src="images/pizza.jpg">

            <h2>Pizza</h2>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart

            </a>

        <!-- BURGER -->

        <div class="food-box"

            <img src="images/burger.jpg">

            <p class="price">₹149</p>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart
                </button>
            </a>

        </div>

        <!-- PASTA -->

        <div class="food-box"
        data-price="179">

            <img src="images/This Penne Pomodoro is made with garlic, sweet….jpg">

            <h2>Pasta</h2>

            <p class="price">₹179</p>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart
                </button>
            </a>

        </div>

        <!-- FRIES -->

        <div class="food-box"
        data-price="99">

            <img src="images/fries.jpg">

            <h2>French Fries</h2>

            <p class="price">₹99</p>

            <a href="cartpage.html">

                    Add to Cart

            </a>

        </div>

        <!-- SANDWICH -->

        <div class="food-box"
        data-price="129">

            <img src="images/Sandwich Bœuf & Cheddar 🥩🧀_Ingrédients ___1 pain….jpg">

            <h2>Sandwich</h2>

            <p class="price">₹129</p>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart
                </button>
            </a>

        </div>

        <div class="food-box"
        data-price="129">

            <img src="images/pizza_margirita.jpg">

            <h2>Pizza Margarita</h2>

            <p class="price">₹129</p>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart
                </button>
            </a>

        </div>

        <div class="food-box"
        data-price="199">

            <img src="images/Chicken_Broccoli.jpg">

            <h2>Chicken & Broccoli Stir-fry</h2>

            <p class="price">₹199</p>

            <a href="cartpage.html">
                <button class="cart-btn">
                    Add to Cart

            </a>

        </div>

        <div class="food-box"
        data-price="149">

        <div class="food-box"
        data-price="349">

            </a>

        </div>

    </div>
    <div id="footer1"></div>
    <script src="script.js"></script>

    <!-- FILTER SCRIPT -->

    <script>

        let range =
        document.getElementById("priceRange");

        let value =
        document.getElementById("priceValue");

        let items =
        document.querySelectorAll(".food-box");

        range.addEventListener("input", function(){

            value.innerText = this.value;

            items.forEach(function(item){

                let price =
                item.getAttribute("data-price");

                if(price <= range.value){

                    item.style.display = "block";

                }else{

                    item.style.display = "none";
                }

            });

        });

    </script>

</body>
</html>

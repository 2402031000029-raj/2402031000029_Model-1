<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Foodie Menu</title>

    <style>
        body{
            font-family: Arial;
            background-color: #fff3e0;
            text-align: center;
        }

        h1{
            color: orange;
        }

        .menu{
            width: 80%;
            margin: auto;
        }

        .item{
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        img{
            width: 200px;
            border-radius: 10px;
        }

        h2{
            color: #ff6600;
        }

        .price{
            font-size: 20px;
            color: orange;
            font-weight: bold;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .buy-btn{
            background-color: orange;
        }

        .cart-btn{
            background-color: green;
        }
    </style>
</head>

<body>
    <div id="header1"></div><br><br>

    <h1>Foodie Menu</h1>

    <div class="menu">

        <div class="item">

            <img src="images/pizza.jpg" alt="Pizza">

            <h2>Pizza</h2>

            <p>Cheesy and delicious pizza.</p>

            <p class="price">₹199</p>

            <a href="payment.html">
                <button class="buy-btn">Buy Now</button>
            </a>

            <a href="cart.html">
                <button class="cart-btn">Add to Cart</button>
            </a>

        </div>


        <div class="item">

            <img src="images/burger.jpg" alt="Burger">

            <h2>Burger</h2>

            <p>Tasty burger with fresh vegetables.</p>

            <p class="price">₹149</p>

            <a href="payment.html">
                <button class="buy-btn">Buy Now</button>
            </a>

            <a href="cart.html">
                <button class="cart-btn">Add to Cart</button>
            </a>

        </div>


        <div class="item">

            <img src="images/Penne Arrabiata • Olive & Mango.jpg" alt="Pasta">

            <h2>Pasta</h2>

            <p>Creamy Italian pasta.</p>

            <p class="price">₹179</p>

            <a href="payment.html">
                <button class="buy-btn">Buy Now</button>
            </a>

            <a href="cart.html">
                <button class="cart-btn">Add to Cart</button>
            </a>

        </div>


        <div class="item">

            <img src="images/fries.jpg" alt="French Fries">

            <h2>French Fries</h2>

            <p>Crispy and hot fries.</p>

            <p class="price">₹99</p>

            <a href="payment.html">
                <button class="buy-btn">Buy Now</button>
            </a>

            <a href="cart.html">
                <button class="cart-btn">Add to Cart</button>
            </a>

        </div>

    </div>
    
    <div id="footer1"></div>
    <script src="script.js"></script>

</body>
</html>

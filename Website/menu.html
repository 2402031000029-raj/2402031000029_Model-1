<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Menu - Foodie</title>
    

    <style>
        body{
            font-family: Arial;
            background-color: #fff3e0;
            text-align: center;
        }

        h1{
            color: orange;
            
        }

        .menu{
            width: 80%;
            margin: auto;
        }

        .item{
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            
        }

        img{
            width: 200px;
            border-radius: 10px;
        }

        h2{
            color: #f3831b;
            padding-bottom: 10px;

        }

        p.price{
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #ff6600;
        }
    </style>
</head>

<body>
    <div id="header1"></div><br><br>

    <h1>Foodie Menu</h1>

    <div class="menu">
        

        <div class="item">
            <img src="images\pizza.jpg" alt="Pizza">
            <h2>Pizza</h2>
            <p>Cheesy and delicious pizza.</p>
            <p class="price">Price: ₹199</p>
            <a href="payment.html">
                <button>Buy Now</button>
            </a>
        </div>

        <div class="item">
            <img src="images\burger.jpg" alt="Burger">
            <h2>Burger</h2>
            <p>Tasty burger with fresh vegetables.</p>
            <p class="price">Price: ₹149</p>

            <a href="payment.html">
                <button>Buy Now</button>
            </a>
        </div>

        <div class="item">
            <img src="images\Honey Chilli Potato Recipe_ How to Make Honey….jpg" alt="Pasta">
            <h2>Pasta</h2>
            <p>Creamy Italian pasta.</p>
            <p class="price">Price: ₹179</p>
            <a href="payment.html">
                <button>Buy Now</button>
            </a>
        </div>

        <div class="item">
            <img src="images\fries.jpg" alt="French Fries">
            <h2>French Fries</h2>
            <p>Crispy and hot fries.</p>
            <p class="price">Price: ₹99</p>
            <a href="payment.html">
                <button>Buy Now</button>
            </a>
        </div>

    </div>
    <div id="footer1"></div>
    <script src="script.js"></script>


</body>
</html>

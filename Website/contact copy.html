<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="contact.css">
</head>

<body>
    <div id="header1"></div>

    <div class="contact-container">

    
        <div class="contact-info">

            <h2>Contact Information</h2>

            <p>📍 Address: 123 Street, Mumbai, India</p>

            <p>📞 Phone: +91 9876543210</p>

            <p>✉ Email: info@example.com</p>

            
        </div>

    
        <div class="contact-form">

            <h2>Get In Touch</h2>

            <form>

                <input type="text" placeholder="Your Name" required><br><br>

                <input type="email" placeholder="Your Email" required><br><br>

                <input type="text" placeholder="Subject" required><br><br>

                <textarea placeholder="Message" rows="5" required></textarea><br><br>

                <button type="submit">Send Message</button><br><br>

            </form>

        </div>

    </div>
    <style>
        *{
    margin:0;
    padding:0;
    font-family:Arial;
    box-sizing:border-box;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
    border-color:1px solid black;

}

.contact-container{
    display:flex;
    gap:10px;
    background:#fff;
    padding:30px;
    
    margin-left: 400px; 
    margin-right: 400px;
    border-radius:10px;
    border:1px solid #000000;
    margin-top: 50px;
    margin-bottom: 50px;

}

.contact-info{
    width:250px;

}

.contact-info h2,
.contact-form h2{
    margin-bottom:15px;
    color:#333;
}

.contact-info p{
    margin:10px 0;
    font-size:14px;
}

.contact-form{
    width:250px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    margin:8px 0;
    padding:10px;
    border:1px solid #0b0a0a;
    border-radius:5px;
}

.contact-form button{
    width:100%;
    padding:10px;
    background:#fd8b00;
    color:#fff;
    border:none;
    cursor:pointer;
}
</style>
    <div id="footer1"></div>
    <script src="script.js"></script>

</body>

</html>
